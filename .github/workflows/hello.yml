name: Push Workflow

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello"

      - name: Print name
        run: echo "Rashi"

  job2:
    runs-on: ubuntu-latest
    needs: job1  

    steps:
      - name: Second job message
        run: echo "Job 2 running after Job 1"
